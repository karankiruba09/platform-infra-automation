# Category classification rules for OS strings not found in the map above.
# The collector uses these keyword rules to auto-classify unrecognized OS names.
# Order matters: first match wins.
category_rules:
  - keyword: "Windows"
    category: Windows
    status: Supported
  - keyword: "Ubuntu"
    category: Ubuntu/Debian
    status: Supported
  - keyword: "Debian"
    category: Ubuntu/Debian
    status: Supported
  - keyword: "Photon"
    category: Photon-OS
    status: Supported
  - keyword: "FreeBSD"
    category: FreeBSD
    status: Supported
  - keyword: "Linux"
    category: Linux
    status: Supported
